program: ./main.py
command:
  - python 
  - ${program}
  - --config_name
  # - stack_three_dp_abs_dyn
  - square_ph_dp_abs_dyn
  # - pusht_dp_abs_dyn
method: bayes
metric:
  name: eval/pt_success_rate_nonparam
  goal: maximize
parameters:
  pretrain.train_bs:
    distribution: log_uniform_values
    min: 100
    max: 512
  pretrain.optim.vision_lr:
    distribution: log_uniform_values
    min: 0.1
    max: 0.9
  pretrain.optim.momentum:
    distribution: log_uniform_values
    min: 0.8
    max: 0.95
  temperature:
    distribution: log_uniform_values
    min: 0.04
    max: 0.11
  dist_quantile:
    distribution: log_uniform_values
    min: 0.01
    max: 0.05
  policy.model.image_encoder.noise_std:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01
